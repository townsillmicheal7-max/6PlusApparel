<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>6Plus Apparel – Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:wght@400;600&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --pink-deep: #c2185b;
    --pink-hot: #e91e8c;
    --pink-light: #f8bbd0;
    --gold: #d4a017;
    --gold-bright: #ffd700;
    --dark: #1a0a10;
    --white: #fff8fc;
    --card: rgba(30,12,20,0.95);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark); color:var(--white); font-family:'Cormorant Garamond',serif; min-height:100vh; }

  /* LOGIN */
  #login-screen {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; padding:2rem;
    background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(194,24,91,0.3) 0%, transparent 70%), #1a0a10;
  }
  .login-box {
    background:rgba(30,12,20,0.95); border:1px solid rgba(212,160,23,0.4);
    border-radius:12px; padding:3rem 2.5rem; max-width:420px; width:100%; text-align:center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .login-box h1 { font-family:'Cinzel Decorative',cursive; font-size:1rem; color:var(--gold-bright); letter-spacing:3px; margin-bottom:0.3rem; }
  .login-box p { color:var(--pink-light); font-size:0.9rem; margin-bottom:2rem; font-style:italic; }
  .login-box input {
    width:100%; padding:0.9rem 1rem; background:rgba(255,255,255,0.07);
    border:1px solid rgba(212,160,23,0.4); border-radius:6px; color:#fff;
    font-family:'Cormorant Garamond',serif; font-size:1rem; outline:none; margin-bottom:1rem;
  }
  .login-box button {
    width:100%; padding:1rem; background:linear-gradient(135deg,var(--pink-deep),var(--pink-hot));
    color:#fff; font-family:'Cinzel Decorative',cursive; font-size:0.7rem; letter-spacing:3px;
    border:2px solid var(--gold); border-radius:6px; cursor:pointer;
  }
  .login-error { color:#ff6b6b; font-size:0.85rem; margin-top:0.8rem; display:none; }

  /* DASHBOARD */
  #dashboard { display:none; }

  header {
    background:rgba(26,10,16,0.95); border-bottom:1px solid rgba(212,160,23,0.3);
    padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center;
    position:sticky; top:0; z-index:100;
  }
  header h1 { font-family:'Cinzel Decorative',cursive; font-size:0.9rem; color:var(--gold-bright); letter-spacing:2px; }
  header button {
    padding:0.5rem 1.2rem; background:transparent; border:1px solid rgba(194,24,91,0.5);
    color:var(--pink-light); border-radius:4px; cursor:pointer; font-family:'Cormorant Garamond',serif;
    font-size:0.9rem;
  }

  .stats-bar {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1rem;
    padding:1.5rem 2rem;
  }
  .stat-card {
    background:var(--card); border:1px solid rgba(212,160,23,0.25); border-radius:8px;
    padding:1.2rem; text-align:center;
  }
  .stat-num { font-family:'Playfair Display',serif; font-size:2.2rem; font-weight:900; color:var(--gold-bright); }
  .stat-label { font-family:'Cinzel Decorative',cursive; font-size:0.55rem; letter-spacing:3px; color:var(--pink-light); margin-top:0.3rem; }

  .tabs {
    display:flex; gap:0; border-bottom:1px solid rgba(212,160,23,0.2);
    padding:0 2rem; overflow-x:auto;
  }
  .tab {
    padding:0.9rem 1.5rem; cursor:pointer; font-family:'Cinzel Decorative',cursive;
    font-size:0.6rem; letter-spacing:2px; color:var(--pink-light); border-bottom:2px solid transparent;
    white-space:nowrap; transition:all 0.2s;
  }
  .tab.active { color:var(--gold-bright); border-bottom-color:var(--gold-bright); }

  .tab-content { display:none; padding:1.5rem 2rem; }
  .tab-content.active { display:block; }

  table { width:100%; border-collapse:collapse; }
  th {
    font-family:'Cinzel Decorative',cursive; font-size:0.55rem; letter-spacing:2px;
    color:var(--gold); text-align:left; padding:0.8rem 1rem;
    border-bottom:1px solid rgba(212,160,23,0.3); white-space:nowrap;
  }
  td { padding:0.9rem 1rem; color:var(--pink-light); font-size:0.95rem; border-bottom:1px solid rgba(255,255,255,0.05); vertical-align:top; }
  tr:hover td { background:rgba(194,24,91,0.07); }

  .badge {
    display:inline-block; padding:0.2rem 0.7rem; border-radius:50px;
    font-family:'Cinzel Decorative',cursive; font-size:0.5rem; letter-spacing:1px;
  }
  .badge-pending   { background:rgba(212,160,23,0.2);  color:var(--gold-bright); border:1px solid rgba(212,160,23,0.4); }
  .badge-progress  { background:rgba(233,30,140,0.2);  color:var(--pink-hot);    border:1px solid rgba(233,30,140,0.4); }
  .badge-completed { background:rgba(0,214,50,0.15);   color:#00d632;            border:1px solid rgba(0,214,50,0.4); }
  .badge-cancelled { background:rgba(255,50,50,0.15);  color:#ff6b6b;            border:1px solid rgba(255,50,50,0.3); }
  .badge-quoted    { background:rgba(0,156,222,0.15);  color:#009cde;            border:1px solid rgba(0,156,222,0.3); }
  .badge-shipped   { background:rgba(108,28,209,0.15); color:#9b59e8;            border:1px solid rgba(108,28,209,0.3); }

  select.status-select {
    background:#2a0d18; border:1px solid rgba(212,160,23,0.3); color:#fff;
    padding:0.3rem 0.6rem; border-radius:4px; font-family:'Cormorant Garamond',serif;
    font-size:0.85rem; cursor:pointer;
  }

  .empty { text-align:center; padding:3rem; color:rgba(248,187,208,0.4); font-style:italic; }
  .loading { text-align:center; padding:3rem; color:var(--gold); font-style:italic; }

  .refresh-btn {
    float:right; padding:0.5rem 1.2rem; background:linear-gradient(135deg,var(--pink-deep),var(--pink-hot));
    color:#fff; border:1px solid var(--gold); border-radius:4px; cursor:pointer;
    font-family:'Cinzel Decorative',cursive; font-size:0.55rem; letter-spacing:2px; margin-bottom:1rem;
  }

  @media(max-width:600px) {
    .stats-bar { padding:1rem; }
    .tab-content { padding:1rem; }
    td, th { padding:0.6rem 0.5rem; font-size:0.85rem; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>6Plus Apparel</h1>
    <p>Admin Dashboard — Owner Access Only</p>
    <input id="pwd-input" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter') login()"/>
    <button onclick="login()">Access Dashboard</button>
    <p class="login-error" id="login-error">Incorrect password. Try again.</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header>
    <h1>👑 6Plus Apparel — Dashboard</h1>
    <button onclick="logout()">Sign Out</button>
  </header>

  <div class="stats-bar" id="stats-bar">
    <div class="stat-card"><div class="stat-num" id="stat-orders">—</div><div class="stat-label">Total Orders</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-pending">—</div><div class="stat-label">Pending Orders</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-shipping">—</div><div class="stat-label">Shipping Requests</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-messages">—</div><div class="stat-label">New Messages</div></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('orders')">📦 Orders</div>
    <div class="tab" onclick="switchTab('shipping')">🚚 Shipping Requests</div>
    <div class="tab" onclick="switchTab('messages')">✉️ Messages</div>
  </div>

  <!-- ORDERS TAB -->
  <div class="tab-content active" id="tab-orders">
    <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
    <div id="orders-table"><div class="loading">Loading orders...</div></div>
  </div>

  <!-- SHIPPING TAB -->
  <div class="tab-content" id="tab-shipping">
    <button class="refresh-btn" onclick="loadShipping()">↻ Refresh</button>
    <div id="shipping-table"><div class="loading">Loading shipping requests...</div></div>
  </div>

  <!-- MESSAGES TAB -->
  <div class="tab-content" id="tab-messages">
    <button class="refresh-btn" onclick="loadMessages()">↻ Refresh</button>
    <div id="messages-table"><div class="loading">Loading messages...</div></div>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://hssqujhernibnkplmnbs.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhzc3F1amhlcm5pYm5rcGxtbmJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjI0NjQsImV4cCI6MjA4OTkzODQ2NH0.TIypVVcgf0Rh_iKH3znoWXra7uXAnaQaL9NfebPZICk';
const PASSWORD      = '6PlusApparel2026!';

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

function login() {
  const val = document.getElementById('pwd-input').value;
  if (val === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pwd-input').value = '';
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  const tabs = ['orders','shipping','messages'];
  document.querySelectorAll('.tab')[tabs.indexOf(name)].classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

function badge(status) {
  const map = { pending:'badge-pending', in_progress:'badge-progress', completed:'badge-completed', cancelled:'badge-cancelled', quoted:'badge-quoted', shipped:'badge-shipped', delivered:'badge-completed' };
  return `<span class="badge ${map[status]||'badge-pending'}">${status||'pending'}</span>`;
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

async function loadAll() {
  loadOrders(); loadShipping(); loadMessages();
}

async function loadOrders() {
  document.getElementById('orders-table').innerHTML = '<div class="loading">Loading...</div>';
  const { data } = await db.from('orders').select('*').order('created_at', { ascending: false });
  document.getElementById('stat-orders').textContent = data?.length ?? 0;
  document.getElementById('stat-pending').textContent = data?.filter(o=>o.status==='pending').length ?? 0;

  if (!data || data.length === 0) {
    document.getElementById('orders-table').innerHTML = '<div class="empty">No orders yet. They\'ll show up here when customers place them!</div>';
    return;
  }
  document.getElementById('orders-table').innerHTML = `
    <table>
      <thead><tr>
        <th>Date</th><th>Customer</th><th>Product</th><th>Details</th><th>Price</th><th>Rush</th><th>Status</th>
      </tr></thead>
      <tbody>${data.map(o => `
        <tr>
          <td style="white-space:nowrap">${fmtDate(o.created_at)}</td>
          <td><strong style="color:#fff">${o.customer_name}</strong><br><small>${o.customer_email||''}</small><br><small>${o.customer_phone||''}</small></td>
          <td>${o.product}</td>
          <td>${[o.size,o.color,o.custom_details].filter(Boolean).join(' · ')||'—'}</td>
          <td>${o.total_price ? '$'+o.total_price : '—'}</td>
          <td>${o.rush_order?'⚡ Yes':'No'}</td>
          <td>
            <select class="status-select" onchange="updateStatus('orders','${o.id}',this.value)">
              ${['pending','in_progress','completed','cancelled'].map(s=>`<option value="${s}"${o.status===s?' selected':''}>${s.replace('_',' ')}</option>`).join('')}
            </select>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function loadShipping() {
  document.getElementById('shipping-table').innerHTML = '<div class="loading">Loading...</div>';
  const { data } = await db.from('shipping_requests').select('*').order('created_at', { ascending: false });
  document.getElementById('stat-shipping').textContent = data?.length ?? 0;

  if (!data || data.length === 0) {
    document.getElementById('shipping-table').innerHTML = '<div class="empty">No shipping requests yet.</div>';
    return;
  }
  document.getElementById('shipping-table').innerHTML = `
    <table>
      <thead><tr>
        <th>Date</th><th>Customer</th><th>Address</th><th>Weight</th><th>Order Details</th><th>Cost</th><th>Status</th>
      </tr></thead>
      <tbody>${data.map(s => `
        <tr>
          <td style="white-space:nowrap">${fmtDate(s.created_at)}</td>
          <td><strong style="color:#fff">${s.customer_name}</strong></td>
          <td>${s.street_address}<br>${s.city}, ${s.state} ${s.zip_code}</td>
          <td>${s.estimated_weight}</td>
          <td>${s.order_details||'—'}</td>
          <td>${s.shipping_cost ? '$'+s.shipping_cost : '—'}</td>
          <td>
            <select class="status-select" onchange="updateStatus('shipping_requests','${s.id}',this.value)">
              ${['pending','quoted','paid','shipped','delivered'].map(st=>`<option value="${st}"${s.status===st?' selected':''}>${st}</option>`).join('')}
            </select>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function loadMessages() {
  document.getElementById('messages-table').innerHTML = '<div class="loading">Loading...</div>';
  const { data } = await db.from('contact_submissions').select('*').order('created_at', { ascending: false });
  document.getElementById('stat-messages').textContent = data?.filter(m=>!m.responded).length ?? 0;

  if (!data || data.length === 0) {
    document.getElementById('messages-table').innerHTML = '<div class="empty">No contact submissions yet.</div>';
    return;
  }
  document.getElementById('messages-table').innerHTML = `
    <table>
      <thead><tr>
        <th>Date</th><th>Name</th><th>Contact</th><th>Message</th><th>Responded</th>
      </tr></thead>
      <tbody>${data.map(m => `
        <tr>
          <td style="white-space:nowrap">${fmtDate(m.created_at)}</td>
          <td><strong style="color:#fff">${m.name}</strong></td>
          <td>${m.email||''}${m.email&&m.phone?'<br>':''}${m.phone||''}</td>
          <td style="max-width:300px">${m.message}</td>
          <td>
            <select class="status-select" onchange="markResponded('${m.id}',this.value==='true')">
              <option value="false"${!m.responded?' selected':''}>❌ No</option>
              <option value="true"${m.responded?' selected':''}>✅ Yes</option>
            </select>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function updateStatus(table, id, status) {
  await db.from(table).update({ status }).eq('id', id);
  if (table === 'orders') loadOrders();
  if (table === 'shipping_requests') loadShipping();
}

async function markResponded(id, val) {
  await db.from('contact_submissions').update({ responded: val }).eq('id', id);
  loadMessages();
}
</script>
</body>
</html>
